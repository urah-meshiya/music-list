<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Document</title>

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

<style>
:root {
    --bg: #f7f7f5;
    --text: #1f1f1f;
    --muted: #7a7a7a;
    --line: #e5e5e5;
    --code-bg: #efefef;
}

* {
    box-sizing: border-box;
}

html {
    scroll-behavior: smooth;
}

body {
    margin: 0;
    background: var(--bg);
    color: var(--text);
    font-family:
        Inter,
        "SF Pro Display",
        "Segoe UI",
        "Noto Sans JP",
        sans-serif;
    font-size: 16px;
    line-height: 1.9;
    -webkit-font-smoothing: antialiased;
}

.container {
    width: min(1200px, calc(100vw - 48px));
    margin: 0 auto;
}

header {
    padding-top: 80px;
    padding-bottom: 48px;
}

.eyebrow {
    color: var(--muted);
    font-size: 12px;
    letter-spacing: .24em;
    margin-bottom: 20px;
    text-transform: uppercase;
}

#pageTitle {
    margin: 0;
    font-size: clamp(2.8rem, 6vw, 4.5rem);
    line-height: 1.05;
    letter-spacing: -0.06em;
    font-weight: 800;
}

#tocContainer {
    margin-bottom: 56px;
    padding: 24px;
    border: 1px solid var(--line);
    border-radius: 14px;
    background: #fff;
}

#tocContainer h2 {
    margin-top: 0;
    margin-bottom: 16px;
    font-size: 1.2rem;
}

#toc {
    list-style: none;
    padding: 0;
    margin: 0;
}

#toc li {
    margin: 8px 0;
}

#toc li.toc-h3 {
    padding-left: 18px;
}

#toc li.toc-h4 {
    padding-left: 36px;
}

#toc a {
    color: inherit;
    text-decoration: none;
    border-bottom: 1px solid transparent;
}

#toc a:hover {
    border-bottom-color: currentColor;
}

#content {
    padding-bottom: 120px;
}

#content h1 {
    display: none;
}

#content h2 {
    margin-top: 80px;
    margin-bottom: 20px;
    font-size: 2rem;
    line-height: 1.2;
    letter-spacing: -0.04em;
    font-weight: 750;
}

#content h3 {
    margin-top: 48px;
    margin-bottom: 12px;
    font-size: 1.3rem;
    letter-spacing: -0.02em;
}

#content h4 {
    margin-top: 32px;
    margin-bottom: 8px;
}

#content p {
    margin: 1.3em 0;
}

#content ul,
#content ol {
    padding-left: 1.5em;
}

#content li {
    margin: .4em 0;
}

#content a {
    color: inherit;
    text-decoration: none;
    border-bottom: 1px solid #bcbcbc;
    transition: .15s ease;
}

#content a:hover {
    border-color: #111;
}

#content blockquote {
    margin: 36px 0;
    padding: 4px 0 4px 24px;
    border-left: 2px solid #222;
    color: var(--muted);
}

#content hr {
    border: none;
    border-top: 1px solid var(--line);
    margin: 64px 0;
}

#content img {
    display: block;
    max-width: 100%;
    margin: 40px auto;
    border-radius: 14px;
}

#content pre {
    overflow-x: auto;
    padding: 24px;
    margin: 28px 0;
    border-radius: 14px;
    background: var(--code-bg);
    font-size: .9rem;
}

#content code {
    font-family:
        "JetBrains Mono",
        Consolas,
        monospace;
}

#content p code,
#content li code,
#content td code {
    background: var(--code-bg);
    padding: .15em .4em;
    border-radius: 6px;
}

#content table {
    width: 100%;
    border-collapse: collapse;
    margin: 36px 0;
}

#content th {
    background-color: var(--line);
}

#content th,
#content td {
    padding: 14px 5px;
    border: 1px solid var(--line);
}

footer {
    color: var(--muted);
    font-size: .85rem;
    padding: 32px 0 48px;
    border-top: 1px solid var(--line);
}

#backToTop {
    position: fixed;
    right: 24px;
    bottom: 24px;

    width: 52px;
    height: 52px;

    border: none;
    border-radius: 999px;

    background: #222;
    color: #fff;

    font-size: 20px;
    cursor: pointer;

    opacity: 0;
    visibility: hidden;

    transition:
        opacity .2s ease,
        visibility .2s ease,
        transform .2s ease;
}

#backToTop.show {
    opacity: 1;
    visibility: visible;
}

#backToTop:hover {
    transform: translateY(-2px);
}

@media (max-width: 768px) {
    .container {
        width: calc(100vw - 32px);
    }

    header {
        padding-top: 48px;
        padding-bottom: 32px;
    }

    #pageTitle {
        font-size: 2.5rem;
    }

    #content h2 {
        margin-top: 56px;
        font-size: 1.6rem;
    }
}
</style>
</head>
<body>

<header class="container">
    <div class="eyebrow">DOCUMENTATION</div>
    <h1 id="pageTitle">Loading...</h1>
</header>

<main class="container">

    <nav id="tocContainer" style="display:none;">
        <h2>目次</h2>
        <ul id="toc"></ul>
    </nav>

    <article id="content">
        読み込み中...
    </article>

</main>

<footer class="container">
    created by urah_meshiya
</footer>

<button id="backToTop" aria-label="上に戻る">
    ↑
</button>

<script>
(async () => {
    try {
        const res = await fetch('./README.md');

        if (!res.ok) {
            throw new Error(`HTTP ${res.status}`);
        }

        const markdown = await res.text();

        const match = markdown.match(/^#\s+(.+)$/m);

        document.title = match
            ? match[1]
            : 'Document';

        document.getElementById('pageTitle').textContent =
            match
                ? match[1]
                : 'Document';

        document.getElementById('content').innerHTML =
            marked.parse(markdown);

        const content = document.getElementById('content');
        const toc = document.getElementById('toc');
        const tocContainer = document.getElementById('tocContainer');

        const headings = content.querySelectorAll('h2, h3, h4');

        if (headings.length > 0) {

            tocContainer.style.display = 'block';

            headings.forEach((heading, index) => {

                const id =
                    heading.textContent
                        .trim()
                        .replace(/\s+/g, '-')
                        .replace(/[^\w\-ぁ-んァ-ヶ一-龯]/g, '')
                    || `section-${index}`;

                heading.id = id;

                const li = document.createElement('li');
                li.className = `toc-${heading.tagName.toLowerCase()}`;

                const a = document.createElement('a');
                a.href = `#${id}`;
                a.textContent = heading.textContent;

                li.appendChild(a);
                toc.appendChild(li);
            });
        }

        const backToTop = document.getElementById('backToTop');

        window.addEventListener('scroll', () => {

            if (window.scrollY > 400) {
                backToTop.classList.add('show');
            } else {
                backToTop.classList.remove('show');
            }

        });

        backToTop.addEventListener('click', () => {

            window.scrollTo({
                top: 0,
                behavior: 'smooth'
            });

        });

    } catch (err) {

        document.getElementById('pageTitle').textContent =
            'Error';

        document.getElementById('content').innerHTML = `
            <p>Markdownの読み込みに失敗しました。</p>
            <pre>${err.message}</pre>
        `;
    }
})();
</script>

</body>
</html>
